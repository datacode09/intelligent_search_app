## azure-pipelines/ui.yml
## Builds and deploys the React UI (hydro-one-hods-ui) to Azure Static Web Apps.
## Trigger: any change under hydro-one-hods-ui/ merged to main.

trigger:
  branches:
    include: [main]
  paths:
    include: [hydro-one-hods-ui/**]

pr:
  branches:
    include: [main]
  paths:
    include: [hydro-one-hods-ui/**]

variables:
  nodeVersion: '20.x'
  workingDir: hydro-one-hods-ui

stages:

# ── Stage 1: CI ───────────────────────────────────────────────────────────
- stage: CI
  displayName: Build and Lint
  jobs:
  - job: Build
    displayName: npm ci + build
    pool:
      vmImage: ubuntu-latest
    steps:
    - checkout: self

    - task: NodeTool@0
      displayName: Set up Node $(nodeVersion)
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm ci
      displayName: Install dependencies
      workingDirectory: $(workingDir)

    - script: npm run lint --if-present
      displayName: Lint
      workingDirectory: $(workingDir)

    - script: npm run build
      displayName: Build
      workingDirectory: $(workingDir)
      env:
        VITE_API_BASE_URL: $(API_APP_URL)   # Set in Azure DevOps → Pipelines → Variables

    - task: PublishBuildArtifacts@1
      displayName: Publish dist artifact
      inputs:
        pathToPublish: $(workingDir)/dist
        artifactName: ui-dist

# ── Stage 2: Deploy ────────────────────────────────────────────────────────
- stage: Deploy
  displayName: Deploy UI
  dependsOn: CI
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployUI
    displayName: Deploy to Azure Static Web Apps
    environment: production
    pool:
      vmImage: ubuntu-latest
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: ui-dist

          - task: AzureStaticWebApp@0
            displayName: Deploy Static Web App
            inputs:
              azure_static_web_apps_api_token: $(STATIC_WEB_APP_TOKEN)   # Pipeline variable (secret)
              app_location: $(workingDir)
              output_location: dist
              skip_app_build: true       # already built in CI stage
